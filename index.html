<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule Editor</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 id="title">Schedule</h1>
      <div class="lang-switcher">
        <button class="lang-btn active" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="ua">UA</button>
        <button class="lang-btn" data-lang="fr">FR</button>
      </div>
    </div>

    <div class="toolbar">
      <button class="btn" id="exportBtn">Copy to Clipboard</button>
      <div class="occ-controls">
        <button class="occ-toggle" id="occToggle">Occurrences</button>
        <div class="occ-extras" id="occExtras">
          <select class="occ-dropdown" id="occWindow">
            <option value="7">7</option>
            <option value="14">14</option>
            <option value="21">21</option>
            <option value="30">30</option>
          </select>
          <div class="occ-nav">
            <button id="occUp" title="Move window up">&#9650;</button>
            <button id="occDown" title="Move window down">&#9660;</button>
          </div>
        </div>
      </div>
      <button class="roster-toggle" id="rosterToggle">Roster</button>
      <span class="toolbar-spacer"></span>
      <button class="btn-undo" id="undoBtn" disabled title="Undo (Ctrl+Z)">&#8592;</button>
      <button class="btn-redo" id="redoBtn" disabled title="Redo (Ctrl+Y)">&#8594;</button>
    </div>

    <div class="roster-panel" id="rosterPanel">
      <div class="roster-title"><span id="rosterTitle">Roster</span></div>
      <div class="roster-add">
        <input type="text" id="rosterInput" placeholder="Add name...">
        <button id="rosterAddBtn">+</button>
      </div>
      <div id="rosterBody"></div>
    </div>

    <div class="occ-stats" id="occStats">
      <div class="occ-stats-title" id="occStatsTitle">Statistics</div>
      <div id="occStatsBody"></div>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th class="col-date" id="thDate">Date</th>
            <th id="thConductor">Conductor</th>
            <th id="thVip">VIP</th>
            <th class="col-actions"></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <button class="add-row-inline" id="addRowInline">
      <svg width="14" height="14" viewBox="0 0 16 16"><path d="M8 1a1 1 0 0 1 1 1v5h5a1 1 0 1 1 0 2H9v5a1 1 0 1 1-2 0V9H2a1 1 0 0 1 0-2h5V2a1 1 0 0 1 1-1z"/></svg>
    </button>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <h3 id="modalTitle">Fill dates?</h3>
        <p id="modalDesc">Auto-fill all rows with sequential dates:</p>
        <div class="preview" id="modalPreview"></div>
        <div class="modal-actions">
          <button class="btn-cancel" id="modalCancel">Cancel</button>
          <button class="btn" id="modalConfirm">Fill dates</button>
        </div>
      </div>
    </div>

    <div class="footer" style="margin-top:16px;">
      <a class="github-link" href="https://github.com/Vladkarok/traing" target="_blank" rel="noopener noreferrer">
        <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        <span id="labelGithub">View on GitHub</span>
      </a>
    </div>
  </div>

  <script src="app.js"></script>
  <script src="occurrence.js"></script>
  <script src="roster.js"></script>
  <script>
    loadData();
    loadRoster();
    syncRosterFromTable();
    applyLang();
    updateUndoRedoButtons();
  </script>
</body>
</html>
